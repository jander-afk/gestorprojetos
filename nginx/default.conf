# Reverse proxy para o app Next (serviço `web` na porta 3000).
# Troque seu-dominio.com.br pelo domínio real.

upstream kanban_web {
  server web:3000;
}

# HTTP -> redireciona para HTTPS (deixe ativo só depois de emitir o cert)
server {
  listen 80;
  server_name seu-dominio.com.br;

  # Necessário para o desafio do certbot:
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Enquanto não houver TLS, sirva direto (comente após emitir o cert):
  location / {
    proxy_pass http://kanban_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Após emitir o certificado, descomente para forçar HTTPS:
  # return 301 https://$host$request_uri;
}

